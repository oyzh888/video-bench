name: Build & deploy GitHub Pages

# Auto-rebuilds report.html from results/*.json and publishes to GitHub Pages
# whenever new results are pushed. Each contributor just commits their JSON.

on:
  push:
    branches: [master, main]
    paths:
      - "results/**"
      - "report.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Build report
        run: |
          python3 report.py
          mkdir -p _site
          cp report.html _site/index.html
          cp -r results _site/results
      - uses: actions/upload-pages-artifact@v3
        with: { path: _site }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
